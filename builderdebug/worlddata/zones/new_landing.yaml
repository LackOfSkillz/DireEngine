- id: upper-crossing-260236-4226-4226
  name: Upper Crossing [260,236]
  short_desc: null
  desc: This corner of Upper Crossing sits among the braided streets of New Landing,
    ordinary only until you stop and take its measure. Timber-fronted shops lean over
    the street on carved brackets, their upper stories almost close enough to shake
    hands across. Rainwater has polished the high stones bright while the low places
    keep grit, peelings, and market dust. Trade presses close around the street, with
    voices, wheels, and hanging signs crowding the space.
  map:
