- id: watcher_nook
  name: The Watcher's Nook
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Watcher's Nook sits at the base of the Entry Stair, a low-ceilinged chamber\
    \ where timber beams press close above worn planks. Stone walls bear the scuffs\
    \ and stains of long occupation, and the faint smell of old smoke clings to the\
    \ corners where guards have warmed themselves between shifts. Rough bunks line\
    \ the walls in careless rows, their frames showing the marks of countless boots\
    \ and elbows, while the floor between them is darkened by traffic and spilled\
    \ drink. This is working space, not ceremony\u2014a place where the Guild's sentries\
    \ rest with the same rough humor they bring to their watch, making dignity from\
    \ shared exhaustion and stolen comfort."
  stateful_descs: {}
