- id: lockyard
  name: The Lockyard
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Lockyard sits within the Training Corridor, its planked floor scuffed
    and stained from years of rogues testing their craft at the long workbench that
    runs along the stone wall. Timber beams overhead bear carved tallies and crude
    jokes, each mark a small claim of dignity stolen from the surface world's order.
    Dust hangs in the air, stirred by footsteps from the workshops nearby, and the
    faint sounds of bustling work carry through the chamber's boundaries. The worn
    bench shows generations of lockpicks, bent wires, and practice tumbler sets, evidence
    of a trade passed hand to hand with rough humor and wary pride.
