placements:
  npcs:
  - id: guild_leader
    room: court_of_coins
    typeclass: typeclasses.npcs.NPC
    definition:
      name: the guild leader
      description:
        short: A sharp-eyed rogue in ragged finery watches the hall like a crowned
          conspirator.
        long: The guild leader carries battered velvet and stolen lace with the confidence
          of a monarch who built a throne from the city's refuse.
  - id: guild_merchant
    room: honest_stall
    typeclass: typeclasses.vendor.Vendor
    definition:
      name: the guild merchant
      description:
        short: A pragmatic merchant weighs gear and coin with professional suspicion.
        long: The guild merchant keeps a neat spread of practical gear beneath patched
          awnings and candle smoke, ready to equip any thief who can pay.
      vendor:
        enabled: true
        inventory: []
  - id: fence
    room: fences_curtain
    typeclass: typeclasses.vendor.Vendor
    definition:
      name: the fence
      description:
        short: A narrow-eyed fence lounges behind a heavy curtain with one palm always
          half open.
        long: The fence sits behind thick curtain folds with a ledger, a knife, and
          the expression of someone already discounting your story and your goods.
      vendor:
        enabled: true
        inventory: []
  - id: lockpick_trainer
    room: lockyard
    typeclass: typeclasses.npcs.NPC
    definition:
      name: the lockpick trainer
      description:
        short: A scarred thief works a row of practice locks by torchlight.
        long: The lockpick trainer keeps a patient eye on misused picks and stubborn
          tumblers, correcting fingers with dry insults and quicker hands.
  - id: pickpocket_trainer
    room: marks_walk
    typeclass: typeclasses.npcs.NPC
    definition:
      name: the pickpocket trainer
      description:
        short: A wiry cutpurse paces beside pouch-hung dummies with a mocking grin.
        long: The pickpocket trainer glides along the practice lane with empty hands
          and busy eyes, teaching theft as rhythm more than speed.
  - id: stealth_trainer
    room: shadowed_hall
    typeclass: typeclasses.npcs.NPC
    definition:
      name: the stealth trainer
      description:
        short: A hooded veteran watches the shadows harder than the light.
        long: The stealth trainer stands in the dim with arms folded, measuring every
          footfall by what it disturbs rather than what it reaches.
  - id: combat_trainer
    room: the_pit
    typeclass: typeclasses.npcs.NPC
    definition:
      name: the combat trainer
      description:
        short: A broad-shouldered bruiser stands ankle-deep in churned sand.
        long: The combat trainer treats the pit like a chapel of bruises, correcting
          stance and timing with barked orders and blunt demonstrations.
  - id: quartermaster
    room: quartermaster_hold
    typeclass: typeclasses.vendor.Vendor
    definition:
      name: the quartermaster
      description:
        short: A careful quartermaster checks stores against a grease-stained tally
          board.
        long: The quartermaster works among crates, rope bundles, and ration jars
          with the suspicious focus of someone who has seen inventory vanish by friendly
          hands.
      vendor:
        enabled: true
        inventory: []
  - id: watcher
    room: watcher_nook
    typeclass: typeclasses.npcs.guard.GuardNPC
    definition:
      name: the watcher
      description:
        short: A guild watcher leans in the nook with an easy posture and a hard stare.
        long: The watcher keeps one shoulder to the wall above the threshold, reading
          every arrival as though weighing whether they belong below the city at all.
      behavior:
        aggressive: false
        assist: true
  items:
  - id: donation_shelf
    room: donation_shelf_room
    typeclass: typeclasses.objects.Object
    definition:
      name: the donation shelves
  - id: weapon_rack_pit
    room: the_pit
    typeclass: typeclasses.objects.Object
    definition:
      name: a weapon rack
  - id: lockpick_practice_set
    room: lockyard
    typeclass: typeclasses.objects.Object
    definition:
      name: a practice lockpick set
