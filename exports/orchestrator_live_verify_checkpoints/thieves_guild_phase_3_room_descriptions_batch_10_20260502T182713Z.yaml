- id: sewer_grate
  name: The Sewer Grate
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Entry Stair drops into a low cellar beneath worn stone walls, its earthen\
    \ floor packed hard by years of traffic. Smoke smell clings to the neglected space,\
    \ drifting from somewhere deeper in the Entry Wing, while the quiet presses close\
    \ against the rough boundaries. A rusted iron grate overhead marks the surface\
    \ world's floor, its bars crossed with old soot and the stains of discarded things\u2014\
    what the streets above throw away becomes the ceiling here. The stair continues\
    \ down into shadow, carrying with it the faint sound of voices that mock what\
    \ they cannot have and claim what they can take."
  stateful_descs: {}
  details: {}
