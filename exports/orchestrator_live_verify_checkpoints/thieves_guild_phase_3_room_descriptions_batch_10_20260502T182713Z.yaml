- id: drinking_pit
  name: The Drinking Pit
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Drinking Pit sits low beneath timber beams blackened by years of hearth
    smoke, its stone walls bearing the scars of countless carved marks and rough repairs.
    A dirt floor, packed hard by traffic, slopes slightly toward the center where
    benches and makeshift tables crowd together in defiant disorder. The hearth throws
    uneven light across faces turned toward each other rather than the room's shabby
    edges, and the air carries smoke, spilled ale, and the low buzz of voices that
    drop when strangers enter. This is the Common Passage's own hall, where working
    hands and wary eyes claim space the surface world would deny them.
