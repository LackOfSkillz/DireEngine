- id: donation_shelf_room
  name: The Sharing Shelves
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Sharing Shelves sits within the Common Wing, a rough timber chamber where\
    \ planked floors bear the scuff and stain of constant traffic. Worn beams overhead\
    \ frame walls lined with makeshift shelving, each plank crowded with mismatched\
    \ goods\u2014dented cups, frayed rope, chipped crockery\u2014arranged with a defiant\
    \ care that mocks the orderly storerooms above. A battered workbench stands against\
    \ the far wall, its surface scarred by knife marks and spilled wax, while dust\
    \ hangs faint in the still air. Here the discarded becomes currency, and what\
    \ the surface world throws away is sorted, claimed, and shared with the gravity\
    \ of a merchant's inventory."
  stateful_descs: {}
