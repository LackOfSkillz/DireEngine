- id: memorial_wall
  name: The Memorial Wall
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Memorial Wall stands at the end of Common Passage, a rough-hewn chamber\
    \ where stone walls bear carved names and crude symbols marking those the underclass\
    \ claims as their own. Timber beams overhead show smoke stains from years of candle\
    \ offerings left at the low shrine set into the eastern wall, its surface worn\
    \ smooth by countless hands. The flagstone floor is uneven, patched with mismatched\
    \ stone where the living have made repairs in defiance of the dungeon's decay.\
    \ Smoke hangs faint in the still air, carrying the scent of tallow and old incense,\
    \ while the quiet presses close around the chamber's boundaries\u2014a stolen\
    \ dignity carved from stone and memory."
