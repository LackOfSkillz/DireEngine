- id: market_gate
  name: Market Gate
  desc: A broad gate opens onto the town's market road.
  stateful_descs:
    season_winter: Market Gate stands where Market Street enters the Market District
      from the south, its worn timber signpost marking the threshold with carved lettering
      that names the district beyond. Cobbles underfoot show frost in the shadowed
      corners where winter cold settles, while the open route north carries a biting
      wind down from the district's interior. The Old Bell Tower rises visible to
      the north, its stone outline sharp against the winter sky. Merchants' carts
      have left wheel ruts along the street's center, and the steady traffic of a
      working port town shows in the hardened, well-traveled ground.
    time_night: Market Gate stands where Market Street opens into the Market District,
      its worn timber signpost marking the threshold with carved directions toward
      the Old Bell Tower and the harbor beyond. Lamplight pools at the base of the
      post, casting long shadows across the packed earth where daytime crowds have
      left their mark in scuffed ground and wheel ruts. The north-south route lies
      quiet now, though the faint creak of shop shutters and distant footsteps promise
      the district will wake again with morning. Timber-framed buildings press close
      on either side, their plank walls and iron fittings showing the practical construction
      of a working port town.
    time_evening: Market Gate stands where Market Street opens into the Market District,
      its worn timber archway marking the threshold between the port town's outer
      lanes and the trading grounds beyond. A weathered signpost leans beside the
      entrance, its painted arrows directing traffic toward the district's stalls
      and the Old Bell Tower rising to the north. Evening light fades across the cobbles
      as merchants secure their carts and lamplighters move through the crossing,
      their torches catching on the archway's iron fittings. The steady flow of traders
      and dock workers passing beneath the gate slows but does not stop, voices still
      carrying the day's business as shadows stretch long across the worn stones.
    invasion_invasion: Market Street meets the entrance to Market District here, where
      a weathered signpost marks the crossing with routes carved for the Old Bell
      Tower and the harbor beyond. Timber-framed buildings crowd the street's edges,
      their plank fronts showing years of salt air and foot traffic. Shouts carry
      from the north where figures run toward the district's interior, and fresh scorch
      marks blacken the signpost's base where something recently burned. The cobbles
      are scattered with dropped goods and overturned crates left in haste.
