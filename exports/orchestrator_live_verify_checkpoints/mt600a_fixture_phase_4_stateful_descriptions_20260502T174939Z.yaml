- id: market_square
  name: Market Square
  desc: Market Square opens wide where Market Street runs north and south through
    the Market District, its worn cobbles spreading around a central fountain whose
    basin shows years of steady use. Market stalls line the square's edges, their
    timber frames weathered but upright, and the Old Bell Tower rises visible to the
    east above the rooftops. Foot traffic crosses the open space in all directions,
    and the square's broad layout and active commerce give the district its working
    center.
  stateful_descs:
    season_winter: "Market Square opens wide where Market Street runs north and south\
      \ through the Market District, its worn cobbles marked by years of stall traffic\
      \ and trade. A stone fountain stands at the center, its basin chipped and darkened\
      \ with age, while frost gathers thick along the rim and across the paving where\
      \ winter wind sweeps through. The Old Bell Tower rises visible to the north,\
      \ its silhouette sharp against the cold sky. Despite the biting air, the square\
      \ holds its working character\u2014scuff marks and wheel ruts show where merchants\
      \ set their stalls even in hard weather, and the open space carries the promise\
      \ of commerce returning with warmer days."
    time_night: Market Square opens wide where Market Street runs north and south
      through the Market District, its worn cobbles spreading around a central fountain
      whose basin shows years of steady use. Wooden market stalls stand empty now,
      their canvas covers tied down for the night, and lamplight from the surrounding
      buildings casts long shadows across the open ground. The Old Bell Tower rises
      dark against the sky to the north, its silhouette marking the district's edge.
      The square holds a quiet hush after the day's trade, with only occasional footsteps
      crossing between the stalls toward the northern and southern routes.
    time_evening: Market Square opens wide where Market Street crosses through the
      Market District, its worn cobbles marked by years of stall traffic and steady
      trade. A stone fountain stands at the center, its basin chipped but still catching
      the evening light as merchants fold canvas and secure their goods for the night.
      The Old Bell Tower rises to the north, its silhouette darkening against the
      fading sky while lamplighters move between the square's edges. Voices carry
      easily across the open space, calling last prices and arrangements for tomorrow's
      business with the easy confidence of a port town that expects another crowd
      by morning.
    weather_storm: Market Square opens wide where Market Street runs north and south
      through the Market District, its worn cobbles marked by years of stall traffic
      and the press of crowds. A stone fountain stands at the center, its basin chipped
      and darkened by weather, water streaming hard under the storm's downpour. Rain
      hammers the open space, wind driving sheets across the square and blurring the
      outline of the Old Bell Tower that rises to the east. Merchants' canvas flaps
      and strains at its moorings, and the cobbles run with water that pools in the
      low spots where the paving has settled.
    weather_heavy_rain: Market Square opens wide where Market Street runs north and
      south through the Market District, its worn cobbles marked by years of stall
      traffic and cart wheels. A stone fountain stands at the center, its basin darkened
      by weather and constant use, water pooling across the uneven paving where drains
      struggle with the steady rain. Timber-framed merchant stalls ring the square's
      edges, their canvas awnings sagging under the downpour, runoff streaming from
      every corner. The Old Bell Tower rises to the east beyond the square's boundary,
      its stonework slick and darkened. Despite the rain, voices carry across the
      open space as traders call out and footsteps splash through standing water,
      the square's activity undimmed by the weather.
    invasion_invasion: Market Square opens wide where Market Street runs north and
      south through the Market District, its worn cobbles marked by years of stall
      traffic and trade. The square's central fountain stands dry, its basin cracked
      and tilted where something heavy struck it during the attack. Overturned market
      stalls lie scattered across the cobbles, their canvas torn and goods trampled,
      while smoke drifts south from fires still burning near the district's edge.
      The Old Bell Tower rises to the east, its alarm bell silent now, and the square
      that once held the district's busiest trade stands empty except for debris and
      the occasional shout of defenders regrouping near the northern end.
