- id: harbor_road
  name: Harbor Road
  desc: Harbor Road runs straight and wide between timber-framed buildings that lean
    slightly toward the street, their plank siding weathered by salt air. The packed
    earth shows wagon ruts and boot prints crossing in all directions, evidence of
    steady traffic moving goods and travelers through the port district. Voices carry
    from open doorways and the occasional clatter of cart wheels breaks the hum of
    activity that marks the road as a working route rather than a quiet lane.
  stateful_descs:
    season_winter: "Harbor Road runs straight and wide between timber-framed buildings,\
      \ their pitched roofs and shuttered windows marking the practical style of a\
      \ working port district. Cold air moves steadily along the open street, carrying\
      \ the salt tang from the docks and biting at exposed skin. The cobbles underfoot\
      \ are hardened with frost, their worn centers showing white where ice has settled\
      \ into the stone's uneven surface. Traffic moves with purpose despite the chill\u2014\
      carts rattle past, and bundled figures cross between the building fronts where\
      \ awnings offer brief shelter from the winter wind."
    time_night: Harbor Road runs straight between timber-framed buildings whose upper
      stories lean close enough to narrow the view of the night sky. Lamplight from
      shuttered windows falls in uneven patches across the packed earth, leaving the
      street's edges in shadow. The quiet is broken only by occasional footsteps and
      the distant creak of ships at anchor, the day's bustle reduced to scattered
      movement between the pools of light.
    time_evening: "Harbor Road runs straight and wide between timber-framed buildings\
      \ that lean slightly toward the street, their upper stories jutting out over\
      \ the cobbles below. Lamplight begins to glow from doorways and windows as the\
      \ day's trade winds down, casting warm patches across the worn stone paving.\
      \ Voices carry easily in the open air\u2014merchants calling final prices, dock\
      \ workers heading inland, travelers seeking lodging before full dark. The street\
      \ shows its purpose in scuffed stone and cart ruts, a working route between\
      \ the waterfront and the town's inner districts."
    weather_storm: Harbor Road runs straight between timber-framed buildings that
      lean close under the storm's weight, their shutters rattling against iron fittings.
      Rain hammers the cobbles in sheets, pooling where the stones dip and streaming
      toward the gutters in muddy channels. Wind drives the downpour sideways, soaking
      the building fronts and sending loose planks clattering against doorways. Lightning
      flashes briefly illuminate the empty street, showing where the road continues
      north and south through the deluge.
    weather_heavy_rain: Harbor Road runs straight between timber-framed buildings
      whose steep roofs shed steady rain onto the cobbles below. Water streams along
      the gutters and pools where the paving dips, darkening the stone and carrying
      the smell of wet wood and salt from the docks. The street remains passable north
      and south despite the downpour, its worn center showing where carts and foot
      traffic push through even in heavy weather. Voices from doorways and the splash
      of boots through puddles mark the port's refusal to halt for rain.
    invasion_invasion: Harbor Road runs straight between timber-framed buildings that
      lean close overhead, their upper stories jutting out above the cobbled street.
      Smoke rises from a dozen chimneys along the roofline, and the steady sound of
      hammering carries from an open workshop doorway to the west. Shouts echo from
      the harbor direction to the south, sharp and urgent, and a cluster of townspeople
      hurries north away from the docks, some carrying bundled belongings. Fresh scorch
      marks blacken the corner of the nearest building, and broken crates lie scattered
      across the cobbles where someone dropped them in haste.
