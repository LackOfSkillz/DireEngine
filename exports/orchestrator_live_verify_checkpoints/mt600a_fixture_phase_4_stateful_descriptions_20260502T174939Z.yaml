- id: inn_door
  name: Sundrop Inn Doorway
  desc: The inn's carved archway casts a warm pool of shade over the lane.
  stateful_descs:
    season_winter: A broad threshold opens into the Sundrop Inn, its sturdy timber
      frame and iron hinges built to withstand the steady press of travelers. A painted
      signpost above the doorway shows a golden sun, its bright colors holding clear
      despite winter's bite. Cold air sweeps across the threshold from the street,
      carrying the muffled sounds of port traffic and the creak of frost-stiffened
      wood. The worn planks underfoot bear scuff marks from countless boots, darkened
      where melted snow has pooled and refrozen at the edges.
    time_night: A broad threshold opens into the Sundrop Inn, its sturdy timber frame
      and iron hinges marking the boundary between street and shelter. A painted signpost
      swings gently overhead, its lettering still visible in the lamplight that spills
      from the doorway onto the cobbles below. The well-kept entrance shows the steady
      traffic of travelers passing through, with worn boards polished smooth by countless
      boots and the faint warmth of hearthfire reaching outward into the night air.
    time_evening: The threshold of the Sundrop Inn opens onto the street, its sturdy
      timber frame fitted with iron hinges that show regular care. A painted signpost
      swings from a bracket above, marking the inn's name in clear lettering that
      catches the last of the evening light. Lamplight spills from the doorway as
      dusk settles, and the sounds of conversation and footsteps carry outward from
      the common room within.
    invasion_invasion: The threshold of the Sundrop Inn stands open, its heavy door
      pulled back against the wall. A painted signpost above the entrance shows a
      golden sun against blue sky, the colors still bright despite steady weather.
      Shouts carry from the street beyond as townsfolk hurry past with bundles and
      children, their voices tight with alarm. Fresh gouges mark the doorframe where
      something struck hard, and a broken lantern lies kicked aside near the step.
