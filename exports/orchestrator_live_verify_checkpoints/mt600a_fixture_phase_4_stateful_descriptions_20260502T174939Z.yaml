- id: smith_lane
  name: Smith Lane
  desc: Smith Lane cuts east from Market Street as a narrow alley between timber-framed
    buildings, their upper stories leaning close enough to nearly meet overhead. The
    packed earth underfoot shows steady traffic, worn smooth where carts and foot
    traffic pass between the main thoroughfare and the workshops beyond. Voices and
    the ring of hammers carry from the lane's eastern end, marking the working edge
    of Market District.
  stateful_descs:
    season_winter: Smith Lane cuts north from Market Street as a narrow alley between
      timber-framed buildings, their weathered planks showing the salt and wind of
      the port town's winters. Frost clings to the shadowed corners where the close
      walls block the sun, and the packed earth underfoot is hard with cold. The alley
      opens onto the busier thoroughfare to the south, where the sounds of Market
      District's trade carry even in the chill air.
    time_night: Smith Lane cuts north from Market Street as a narrow alley between
      timber-framed buildings, their upper stories leaning close enough to nearly
      meet overhead. Lamplight from shuttered windows falls in thin bars across the
      packed earth underfoot, leaving most of the alley in shadow. The lane runs straight
      north into the Market District, quiet now but marked by the day's passage in
      scuffed ground and the faint smell of forge smoke still hanging in the still
      air.
    time_evening: Smith Lane cuts east from Market Street as a narrow alley between
      timber-framed buildings, their upper stories leaning close enough to cast the
      passage into early shadow as evening settles over Market District. The packed
      earth underfoot shows the day's traffic in scuffed patterns leading toward the
      street. Lamplight begins to glow from doorways along the alley's length, marking
      where smiths and craftsmen finish their work for the day.
    weather_storm: Smith Lane cuts north from Market Street as a narrow alley between
      timber-framed buildings, their upper stories leaning close enough to nearly
      meet overhead. Rain hammers down in sheets, turning the packed earth underfoot
      to slick mud and pooling against the building foundations. Wind drives the downpour
      sideways through the confined space, rattling shutters and sending water streaming
      from the eaves above. The storm reduces the Market District's usual traffic
      to hurried shapes that duck through quickly, heads down against the weather.
    weather_heavy_rain: Smith Lane cuts west from Market Street into the Market District,
      a narrow alley squeezed between timber-fronted buildings whose eaves channel
      steady rain onto the cobbles below. Water runs in quick streams along the center,
      pooling where the stones dip, and the usual clatter of the district is muffled
      beneath the downpour. Soaked planks darken the building fronts, and runoff drips
      from doorframes and shutters in unbroken lines. The lane holds its purpose even
      under rain, its worn path still marking the route traders and workers take between
      the broader thoroughfare and the district's inner reaches.
    invasion_invasion: Smith Lane cuts west from Market Street into a narrow alley
      between timber-framed buildings, their upper stories leaning close enough to
      nearly touch. Fresh planks patch sections of the cobbled ground where cart traffic
      has worn through, and iron brackets jut from the building fronts where merchants
      hang their trade signs during market hours. Shouts carry from Market Street
      as townspeople hurry past the alley mouth, some glancing nervously toward the
      harbor district where smoke rises dark against the sky.
