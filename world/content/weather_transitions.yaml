# Relative-weight Markov transition matrices for ambient zone weather.
# Heuristics:
# - High inertia: current state usually persists with weight 50-75.
# - Adjacent intensities are common; skips are uncommon.
# - Recovery from extremes is gradual.
# - Summer warms rain/storm weighting; winter shifts toward snow.
# - Sandstorms are rare and brief in arid climates.

