# Forage Catalog — DragonRealms-style resource taxonomy
#
# Source: Elanthipedia Foraging compendium and Healing herbs pages,
# captured 2026-04-30. Lists are intended as the canonical resource
# taxonomy for DireBuilder room.resources tagging and engine forage
# tables. Builders pick from this catalog when tagging rooms.
#
# Schema:
#   resources:
#     <slug>:
#       display_name: human-readable name
#       category: one of (general | wood | herb | healing_herb | food |
#                         flora | mushroom | seashell | mineral_misc |
#                         fauna_part | indoor_misc)
#       skill_ranks: outdoorsmanship rank threshold (0 = no skill required)
#       healing: true if listed on the Healing herbs page
#       seasonal: list of seasons when findable, or [all]
#       time_of_day: [all] | [day] | [night]
#       terrain: list of terrain tags where it natively appears
#                (post-2020 update, most non-water-restricted herbs are
#                broadly findable; terrain here reflects original/canonical
#                association as catalogued in Elanthipedia)
#       indoor: true if findable indoors
#       restrictions: free-text restriction note (climate, special zones)
#       crafting_tags: subsystems this resource feeds
#                (foraging | brewing | alchemy | engineering |
#                 mechanical_lore | candlemaking | oil_pressing |
#                 ranger_companion_food | thief | cleric | role_play |
#                 fire_starter | currency)
#       healed_part: body part (for healing herbs) or null
#       heal_route: internal | external | internal/external | null
#       heal_type: wounds | scars | null

