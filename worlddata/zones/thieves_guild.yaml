- id: rookery
  name: The Rookery
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: Timber stairs climb steeply through the Rookery's upper reaches, their worn
    planks groaning under each step as they rise toward the guild hall above. Rough-hewn
    beams frame the narrow stairwell, their surfaces darkened by years of torch smoke
    and the passage of countless hands along the timber walls. Dust hangs faint in
    the still air, settling on the planked treads where boot traffic has polished
    the wood smooth at the center while leaving the edges splintered and pale. The
    close space carries the weight of shared defiance, every scuff and stain a mark
    left by those who claim this crooked tower as their own court against the world
    above.
  stateful_descs:
    season_winter: "Timber stairs climb steeply within the Rookery, their planked\
      \ treads worn smooth at the center where countless boots have passed. Rough-hewn\
      \ beams frame the narrow ascent, and the timber walls bear scuff marks and old\
      \ stains that speak to years of hard use. Cold air seeps through gaps in the\
      \ planking, carrying the faint smell of dust and making the close space sharper\
      \ in winter's grip. The stairs rise with the same defiant practicality as the\
      \ rogues who claim this hall\u2014no ceremony, just function worn honest by\
      \ those who survive together."
    time_night: Timber stairs climb steeply through the Rookery's upper reaches, their
      worn planks groaning under each step as lamplight throws long shadows across
      the walls. Rough-cut beams overhead bear carved tallies and mockery scratched
      by generations of rogues, turning structural timber into a ledger of defiant
      pride. Dust hangs in the still air, undisturbed in the late hour when even thieves
      keep quieter counsel. The working timber and lived-in wear speak to a place
      where the underclass has claimed vertical space as their own court, making dignity
      from what the surface world discards.
    time_evening: Timber stairs climb steeply through the Rookery's upper reaches,
      their worn planks creaking beneath each step as evening light fades through
      gaps in the beamed ceiling above. Dust hangs in the dimming air, stirred by
      movement between floors, while the smell of old wood and settled grime marks
      years of constant traffic. Scuff marks and boot-worn grooves pattern the steps
      where rogues have climbed and descended in their own rough procession, making
      ceremony from the daily climb. The quiet that settles here at dusk feels deliberate,
      a communal breath held before the night's work begins.
    invasion_invasion: Timber stairs climb steeply through the Rookery's upper reaches,
      their worn planks groaning under hurried boots as rogues rush down from the
      chambers above. Dust hangs thick in the air, stirred by the sudden traffic,
      and the timber walls bear fresh gouges where blades have scraped in haste. The
      usual rough laughter and muttered oaths are gone, replaced by sharp calls and
      the scrape of weapons being drawn. Even here, in what should be the guild's
      safest height, the invasion has turned the Rookery's defiant refuge into a place
      of alarm and readied steel.
