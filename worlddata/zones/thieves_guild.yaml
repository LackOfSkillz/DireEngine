- id: drinking_pit
  name: The Drinking Pit
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Drinking Pit sits low beneath timber beams blackened by years of hearth
    smoke, its stone walls bearing the scars of countless carved marks and rough repairs.
    A dirt floor, packed hard by traffic, slopes slightly toward the center where
    benches and makeshift tables crowd together in defiant disorder. The hearth throws
    uneven light across faces turned toward each other rather than the room's shabby
    edges, and the air carries smoke, spilled ale, and the low buzz of voices that
    drop when strangers enter. This is the Common Passage's own hall, where working
    hands and wary eyes claim space the surface world would deny them.
  stateful_descs:
    season_winter: The Drinking Pit squats beneath timber beams blackened by years
      of hearth smoke, its stone walls slick with winter damp and its dirt floor packed
      hard by cold and constant traffic. The hearth throws uneven light across worn
      benches and rough tables, where rogues crowd close for warmth and mock the surface
      world's winter ceremonies with stolen toasts and hard laughter. Smoke hangs
      thick in the low chamber, carrying the smell of cheap ale and defiance, while
      drafts slip through gaps in the stonework and set the flames guttering. This
      is Common Passage's court, where thieves make dignity from shared survival and
      the cold outside sharpens the value of a place by the fire.
    time_night: "The Drinking Pit sits low-ceilinged beneath timber beams blackened\
      \ by years of hearth smoke, its stone walls close and its dirt floor packed\
      \ hard by boots. At night the hearth burns low, casting long shadows across\
      \ rough-hewn benches where rogues sprawl in lamplight, their laughter quieter\
      \ but no less sharp. The air still carries smoke and old ale, thick enough to\
      \ taste, while scattered coins and carved marks on the tables show where thieves\
      \ settle scores and mock the surface world's courtesies with their own rough\
      \ ceremony. This is Common Passage's court after dark\u2014wary, defiant, and\
      \ fiercely its own."
    time_evening: The Drinking Pit sits low-ceilinged beneath timber beams blackened
      by years of hearth smoke, its stone walls bearing the scars of countless carved
      marks and rough repairs. Evening lamplight spreads unevenly across the dirt
      floor, catching on spilled ale and worn boot tracks where the day's traffic
      has churned the ground to mud. The air carries smoke and the sharp edge of cheap
      spirits, thick enough to taste, while rough laughter and low arguments rise
      from the crowded benches in a defiant chorus that mocks the surface world's
      order. Here in Common Passage, dignity is measured in shared coin and survival,
      and the shabby chamber wears its poverty like stolen finery.
    invasion_invasion: The Drinking Pit squats beneath timber beams blackened by years
      of hearth smoke, its stone walls scarred and its dirt floor trampled to hard-packed
      earth. Benches lie overturned near the cold hearth, and the reek of spilled
      ale mixes with ash where someone kicked embers across the floor. Shouts echo
      from the passage outside, and a broken mug near the entrance shows where the
      last patrons fled in haste. The chamber that once held rough laughter and wary
      defiance now stands emptied by alarm, its communal warmth scattered into the
      tunnels of Common Wing.
