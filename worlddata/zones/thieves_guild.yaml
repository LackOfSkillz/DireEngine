- id: shadowed_hall
  name: The Shadowed Hall
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Shadowed Hall runs through the Training Wing, its flagstone floor worn\
    \ smooth by decades of footfalls and scuffed by practice blades. Stone walls rise\
    \ to timber beams overhead, darkened by smoke from countless torches that have\
    \ lit this passage for rogues learning their craft. The air carries the faint\
    \ smell of old smoke and spilled ale, and the quiet here feels deliberate\u2014\
    a space where the guild's working-class defiance takes root in worn stone and\
    \ shared survival. Doorways along the hall mark where the Training Corridor branches\
    \ into practice rooms, their thresholds smoothed by generations of thieves who\
    \ made dignity from what the surface world discarded."
  stateful_descs:
    season_winter: The Training Corridor runs through worn stone walls and a flagstone
      floor darkened by years of boot traffic and spilled drink. Timber beams overhead
      sag slightly where smoke from the guild hall beyond has stained them black,
      and cold air seeps through gaps in the masonry, carrying the bite of winter
      into the passage. Scuff marks and old stains mark the stones where rogues have
      gathered to trade mockery and coin, turning this rough space into their own
      defiant court. The faint smell of smoke lingers even in the chill, a reminder
      of warmth earned rather than given.
    time_night: The Training Corridor runs through worn flagstone and close stone
      walls, its timber beams darkened by years of lampsmoke and rough use. At night
      the torches burn lower, casting long shadows that shift when anyone passes,
      and the usual noise of sparring and mockery fades to occasional footfalls and
      low voices behind closed doors. The smoke-smell lingers heavier in the still
      air, mixed with old sweat and spilled drink, marking this as a place where rogues
      gather when the surface world sleeps. Scuff marks and blade-nicks along the
      walls show where trainees have practiced their trade, turning a plain hall into
      proof of shared survival.
    time_evening: "The Training Corridor runs through worn flagstone and close stone\
      \ walls, its timber beams darkened by years of smoke from cheap tallow and rougher\
      \ fuel. Evening shadows pool thick in the corners where lamplight from the guild\
      \ hall beyond does not quite reach, leaving the passage half-lit and watchful.\
      \ Scuff marks and old stains mark the floor where boots have carried mud, spilled\
      \ drink, and the evidence of hard practice between the hall's working spaces.\
      \ The air carries the smell of smoke and sweat, familiar and lived-in, while\
      \ the quiet hum of low voices drifts from deeper in the wing\u2014rogues settling\
      \ in as the day's business fades and the night's begins."
    invasion_invasion: The Training Corridor runs east and west between stone walls
      marked by old scuffs and the dark stains of spilled drink. Timber beams overhead
      sag slightly under their own weight, and the flagstone floor shows worn grooves
      where boots have turned the same corners for years. The faint smell of smoke
      lingers in the still air, mixing with the scent of old leather and sweat. Shouts
      echo from the western end where someone has overturned a bench, and fresh bootprints
      track mud and something darker across the stones where rogues have bolted through
      in haste.
