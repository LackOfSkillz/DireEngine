- id: marks_walk
  name: The Mark's Walk
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Mark's Walk runs the length of the Training Wing, its planked floor scuffed
    and uneven from years of footwork drills and hurried passage. Timber walls rise
    close on either side, their surfaces marked with old knife-scores and charcoal
    tallies that record debts, victories, and private jokes among the guild's working
    thieves. Overhead, rough-hewn beams support the ceiling, their edges darkened
    by torch smoke and dust that settles from the workshops beyond. The air carries
    the smell of sawdust and sweat, and the distant clatter of tools and voices reminds
    anyone walking here that they move through a place where survival is earned, not
    given.
  stateful_descs:
    season_winter: The Mark's Walk runs through the Training Wing with planked floors
      worn smooth by countless boots and timber walls scarred from years of rough
      use. Overhead beams show the same hard wear, their surfaces darkened by torch
      smoke and dust that settles thick in the corners where cold air seeps through
      the boards. The hallway carries the smell of sawdust and old sweat, and winter
      drafts cut through gaps in the planking, making the space feel colder than the
      workshops nearby. Scuff marks and boot prints track back and forth along the
      floor, evidence of the steady traffic that moves through here even when the
      season bites hardest.
    time_night: The Mark's Walk runs the length of the Training Wing, its planked
      floor scuffed pale where countless boots have crossed between workshop doorways.
      Timber walls bear old scars and carved initials, and overhead beams sag slightly
      under decades of weight. At night the corridor holds only lamplight from the
      workshops beyond, casting long shadows that shift when someone passes through
      the amber glow. The air smells of dust and old sweat, carrying the faint sounds
      of late work and low voices from rogues who keep their own hours.
    time_evening: "The Mark's Walk runs the length of the Training Wing, its planked\
      \ floor scuffed dark where countless boots have crossed between workshops. Timber\
      \ walls lean close under low beams, and the fading evening light through distant\
      \ doorways leaves the corridor in amber dimness where dust hangs thick in the\
      \ air. Scuff marks and worn grooves in the planks show where rogues have drilled\
      \ footwork and balance, turning an ordinary passage into proof of hard-won skill.\
      \ The smell of sawdust and old sweat mingles with the day's last sounds from\
      \ the nearby workshops\u2014laughter, the scrape of benches, voices settling\
      \ into the night's rough camaraderie."
    invasion_invasion: "The Mark's Walk runs through the Training Wing, its planked\
      \ floor scuffed and uneven where boots have worn the timber smooth. Overhead\
      \ beams show years of smoke stain, and the timber walls bear scratches and gouges\
      \ that mark where blades have been tested or tempers lost. Dust hangs in the\
      \ air, stirred by hurried movement as rogues rush past carrying weapons and\
      \ calling warnings\u2014the guild's defiant order now bent toward alarm, with\
      \ scattered tools and overturned benches showing where training gave way to\
      \ sudden mobilization."
