- id: donation_shelf_room
  name: The Sharing Shelves
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Sharing Shelves sits within the Common Wing, a rough timber chamber where\
    \ planked floors bear the scuff and stain of constant traffic. Worn beams overhead\
    \ frame walls lined with makeshift shelving, each plank crowded with mismatched\
    \ goods\u2014dented cups, frayed rope, chipped crockery\u2014arranged with a defiant\
    \ care that mocks the orderly storerooms above. A battered workbench stands against\
    \ the far wall, its surface scarred by knife marks and spilled wax, while dust\
    \ hangs faint in the still air. Here the discarded becomes currency, and what\
    \ the surface world throws away is sorted, claimed, and shared with the gravity\
    \ of a merchant's inventory."
  stateful_descs:
    season_winter: The Sharing Shelves sits within Common Wing, a low-ceilinged chamber
      where timber walls and planked floor show the wear of constant use. A workbench
      stands against the far wall, its surface scarred and stained, while rough timber
      beams overhead sag slightly under their own weight. Cold air seeps through gaps
      in the planking, carrying the smell of dust and winter damp, and frost traces
      the corners where the floor meets the walls. The space holds the quiet of a
      place kept deliberately apart, where what passes for communal dignity among
      rogues takes the form of shared tools and makeshift order.
    time_night: "The Sharing Shelves sits at the end of Common Passage, a low-ceilinged\
      \ chamber where timber walls and planked floor show the wear of constant use.\
      \ A workbench stands against the far wall, its surface scarred and stained,\
      \ surrounded by rough shelves holding whatever the community has claimed or\
      \ shared. Lamplight picks out the edges of timber beams overhead, leaving the\
      \ corners in shadow, and the quiet hush carries only the faint creak of settling\
      \ wood. Dust hangs in the still air, and the space feels smaller at night, drawn\
      \ in close around what little light remains\u2014a place where rogues keep their\
      \ own rough dignity even when the surface world sleeps above."
    time_evening: "The Sharing Shelves sits at the end of Common Passage, a worn timber\
      \ chamber where planked floors bear the scuff and stain of constant traffic.\
      \ Evening light fades through gaps in the rough walls, leaving the workbench\
      \ and stacked crates in deepening shadow until someone lights the tallow lamps\
      \ that hang from the overhead beams. Dust hangs in the still air, catching what\
      \ dim glow remains, while the quiet settles heavier as the day's exchanges wind\
      \ down. The space carries the threadbare dignity of shared survival\u2014every\
      \ worn plank and battered shelf a small defiance against the surface world's\
      \ indifference."
    invasion_invasion: "The Sharing Shelves sits within the Common Wing, its planked\
      \ floor and timber walls marked by years of rough use. A workbench stands against\
      \ the far wall, its surface scarred and stained from countless exchanges of\
      \ stolen goods and makeshift repairs. Dust hangs in the still air, disturbed\
      \ now by hurried footsteps as rogues shove crates toward the exits and snatch\
      \ bundles from the shelves, their usual swagger replaced by sharp movements\
      \ and low warnings. Overhead beams creak under the weight of hastily stacked\
      \ supplies, while the chamber's worn corners\u2014once sites of quiet barter\
      \ and shared humor\u2014now serve as staging points for those preparing to defend\
      \ or flee."
