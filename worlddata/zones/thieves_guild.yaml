- id: sewer_grate
  name: The Sewer Grate
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Entry Stair drops into a low cellar beneath worn stone walls, its earthen\
    \ floor packed hard by years of traffic. Smoke smell clings to the neglected space,\
    \ drifting from somewhere deeper in the Entry Wing, while the quiet presses close\
    \ against the rough boundaries. A rusted iron grate overhead marks the surface\
    \ world's floor, its bars crossed with old soot and the stains of discarded things\u2014\
    what the streets above throw away becomes the ceiling here. The stair continues\
    \ down into shadow, carrying with it the faint sound of voices that mock what\
    \ they cannot have and claim what they can take."
  stateful_descs:
    season_winter: The Entry Stair descends into a worn cellar beneath the grate,
      its stone walls rough and smoke-stained where torchlight has left its mark.
      Cold air seeps down from above, carrying the bite of winter through the iron
      bars and settling against the earthen floor in a thin crust of frost. The space
      is cramped and neglected, its boundaries close enough that the chill feels sharper
      in the confined air. Scuff marks and old stains pattern the ground near the
      base of the stair, evidence of traffic that moves quickly through rather than
      lingering in the cold.
    time_night: "The Entry Stair descends into a low cellar beneath worn stone walls,\
      \ its earthen floor packed hard by years of traffic. Lamplight catches on rough\
      \ corners and the iron grate overhead, throwing long shadows across the neglected\
      \ space where smoke from somewhere deeper lingers in the still air. The quiet\
      \ here feels deliberate, a hush kept by those who know better than to draw attention\
      \ from the world above. Scuff marks and old stains mark the floor where rogues\
      \ have paused before descending further, their passage a kind of ceremony in\
      \ reverse\u2014entering down instead of climbing up, claiming dignity in descent."
    time_evening: The Entry Stair descends into a worn cellar beneath the Sewer Grate,
      where stone walls bear soot stains and the earthen floor shows the packed traffic
      of countless boots. Fading evening light from above barely reaches the bottom
      step, leaving the space to torchsmoke and lengthening shadow. The air carries
      the smell of old smoke and damp earth, thick enough to taste, while the quiet
      from the street overhead makes every scuff on the stairs audible. Rough planks
      lean against one wall beside a battered stool, arranged with the careless ceremony
      of those who claim dignity from refusal rather than permission.
    invasion_invasion: "The Entry Stair's cellar entrance sits beneath worn stone\
      \ walls that press close around an earthen floor, its rough boundaries marked\
      \ by smoke-stained corners and the faint smell of old fires. A heavy iron grate\
      \ overhead rattles against its frame, shaken by boots pounding past on the street\
      \ above\u2014surface guards running hard, their shouts muffled but urgent through\
      \ the metal. The usual quiet that settles over this neglected threshold is gone,\
      \ replaced by the scrape of hurried movement deeper in the passage and the low\
      \ voices of rogues passing word about what's coming down from the world above."
