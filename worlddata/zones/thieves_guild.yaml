- id: throne_in_tatters
  name: The Throne in Tatters
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Throne in Tatters sits at the heart of Leadership Wing, its flagstone\
    \ floor worn smooth by years of boots and spilled ale. Timber beams cross overhead,\
    \ blackened by smoke that still hangs faint in the quiet air, while stone walls\
    \ bear the scars of rough use\u2014chipped corners, faded marks, and the odd dagger\
    \ gouge that no one bothered to mend. At the chamber's center stands a battered\
    \ throne, its wood patched and recarved a dozen times over, a mockery of surface\
    \ ceremony made dignified by sheer stubborn survival. The space hums with wary\
    \ pride, every worn surface a testament to rogues who built their own court from\
    \ castoffs and defiance."
  stateful_descs:
    season_winter: The Throne in Tatters sits at the heart of Leadership Wing, a stone-walled
      chamber where flagstone meets timber beams overhead and cold air seeps through
      unseen cracks. A battered throne occupies the far wall, its carved wood scarred
      and stained, crowned with a tarnished circlet someone nailed there in mockery
      of the world above. Winter's chill sharpens the smoke-smell that clings to the
      beams, and frost traces the edges of the flagstones where warmth from the guild
      halls nearby cannot reach. Rough laughter and low voices carry from the surrounding
      passages, where rogues gather in defiant assembly, making their own court from
      what the surface discarded.
    time_night: "The Throne in Tatters sits at the top of Leadership Stair, a stone\
      \ chamber where flagstones bear the scuff of countless boots and timber beams\
      \ overhead carry old smoke stains. A battered throne occupies the far wall,\
      \ its carved wood worn smooth by use and mockery\u2014rogues have crowned themselves\
      \ here in jest, turning ceremony into theater. Lamplight pools unevenly across\
      \ the floor, leaving the beams and upper corners in shadow, and the quiet hum\
      \ of voices from nearby guild halls has faded to occasional murmurs that drift\
      \ through the stillness. The air holds the faint smell of old smoke and spilled\
      \ drink, evidence of gatherings that turn survival into shared defiance."
    time_evening: "The Throne in Tatters sits at the top of Leadership Stair, a stone\
      \ chamber where flagstones bear the scuff of boots and spilled drink. Timber\
      \ beams cross overhead, smoke-darkened from years of torchlight, and the throne\
      \ itself\u2014a battered chair draped in mismatched fabric\u2014commands the\
      \ far wall with deliberate mockery of surface ceremony. Evening shadows stretch\
      \ long across the floor as rogues gather in loose clusters, their laughter rough\
      \ and their voices low, testing newcomers with wary glances while the day's\
      \ business settles into quieter defiance. The smoke-tinged air and worn stone\
      \ speak to years of shared survival, dignity claimed not from gold but from\
      \ standing together in this hidden court."
    invasion_invasion: "The Throne in Tatters sits at the heart of Leadership Wing,\
      \ its flagstone floor scuffed by hurried boots and overturned benches. The carved\
      \ wooden throne\u2014once stolen from some surface lord and now crowned with\
      \ tarnished brass\u2014stands empty, its velvet cushions torn where someone\
      \ grabbed them in haste. Stone walls bear fresh gouges near the archway, and\
      \ the smell of smoke drifts heavier than usual through the timber beams overhead.\
      \ Scattered playing cards and a kicked-over ale jug mark where the guild's council\
      \ broke mid-game, their rough laughter replaced by shouts echoing down from\
      \ the stairwell above."
