- id: reliquary
  name: The Reliquary
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Reliquary sits at the end of Leadership Stair, a low-ceilinged chamber
    where worn flagstones meet stone walls braced by rough timber beams. A makeshift
    shrine stands against the far wall, its surface crowded with stolen candlesticks,
    tarnished coins, and carved tokens that mock the surface world's holy places with
    their mismatched assembly. Smoke from cheap tallow hangs in the still air, and
    the quiet here feels deliberate, a pocket of reverence carved from defiance. Scuff
    marks and wax drippings mark where rogues have knelt or stood in their own rough
    ceremonies, claiming dignity from what the world above discarded.
  stateful_descs:
    season_winter: "The Reliquary sits at the base of the Leadership Stair, its flagstone\
      \ floor worn smooth by countless boots and its timber beams dark with old smoke.\
      \ A rough shrine stands against the far wall, draped with stolen cloth and crowned\
      \ with tarnished candlesticks that mock the temples above\u2014here the thieves\
      \ keep their own saints. Stone walls hold the winter cold close, and frost creeps\
      \ along the flagstones where no brazier reaches, but the smoke-smell of banked\
      \ coals lingers thick enough to claim warmth. In this hard season the chamber\
      \ feels smaller, its boundaries drawn tight by those who gather here to share\
      \ what heat and defiance they can muster."
    time_night: "The Reliquary sits at the top of Leadership Stair, a worn stone chamber\
      \ where timber beams cross overhead and flagstones bear the scuff of countless\
      \ boots. A rough shrine stands against the far wall\u2014stolen candlesticks,\
      \ a cracked icon, and a tarnished cup arranged with mock reverence, as if the\
      \ rogues below had built their own altar from the surface world's discarded\
      \ ceremony. At night, lamplight catches the smoke-stained walls and throws long\
      \ shadows across the floor, leaving the shrine's tarnished offerings half-visible\
      \ in the dim. The quiet here feels deliberate, a hush that belongs to those\
      \ who know when to keep still."
    time_evening: The Reliquary sits at the top of the Leadership Stair, a worn stone
      chamber where timber beams cross overhead and flagstones bear the scuff of many
      boots. A rough shrine stands against the far wall, its surface crowded with
      stolen candlesticks and tarnished plate arranged in deliberate mockery of temple
      order. Evening light fades through cracks in the stonework, leaving the chamber
      to the smoke-smell of tallow and the quiet shuffle of those who come to pay
      their own kind of respects. The space holds a wary dignity, where rogues claim
      ceremony on their own terms and make ritual from what the surface world discards.
    invasion_invasion: "The Reliquary sits at the top of the Leadership Stair, its\
      \ flagstone floor scuffed by boots and its timber beams darkened by years of\
      \ smoke. A rough shrine stands against the far wall, its surface cluttered with\
      \ stolen candlesticks and tarnished plate arranged in deliberate mockery of\
      \ surface temples. Stone walls bear scratches and old soot marks, evidence of\
      \ long occupation by those who claim dignity from what others discard. Now the\
      \ chamber carries fresh tension\u2014voices echo sharply up the stair, and someone\
      \ has overturned a bench near the shrine, scattering offerings across the flags\
      \ where boots have already tracked through ash from below."
