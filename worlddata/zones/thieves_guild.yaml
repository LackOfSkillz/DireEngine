- id: false_alley
  name: The False Alley
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The False Alley ends abruptly against the city wall, its worn brick boundaries
    pressing close on three sides. Cobbles underfoot are cracked and uneven, carrying
    a faint layer of dust that marks the space as rarely swept. The alley's dead-end
    shape and shabby upkeep suggest a place the working districts have half-forgotten,
    where rough humor and wary silence share the same narrow ground. A single exit
    leads back south, the only route away from the wall's looming presence.
  stateful_descs:
    season_winter: The False Alley ends abruptly against the city wall's rough brick,
      its worn cobbles dusted with frost and the grit of winter traffic. Shabby brick
      walls press close on either side, their mortar crumbling where cold has worked
      at the joints, and the narrow passage holds a stillness that feels deliberate
      rather than empty. Underfoot, the cobbles are uneven and darkened by years of
      use, their edges sharp with ice where shadows keep the sun away. The air carries
      the dry smell of dust and cold stone, quiet enough that footsteps would echo
      if anyone chose to make noise here.
    time_night: The False Alley ends abruptly against the city wall's rough brick,
      its worn cobbles littered with dust and the faint reek of old refuse. Lamplight
      from the Entry Stair behind casts long shadows across the shabby walls, leaving
      the dead end in near-darkness where the bricks press close. The quiet here feels
      deliberate, a pocket of stillness held apart from the surface world's watch,
      where working folk might slip past notice and the wall itself becomes a boundary
      between what's permitted and what's claimed.
    time_evening: The False Alley ends against the city wall's rough brick, its worn
      cobbles barely wide enough for two to pass shoulder to shoulder. Shabby walls
      lean close on either side, their surfaces stained dark where dust settles thick
      in the evening's fading light. Scuff marks and old stains mark the ground near
      the wall's base, evidence of long use by those who prefer corners the surface
      world overlooks. The alley opens north toward the Entry Stair, where lamplight
      begins to show against the dusk.
    weather_storm: The False Alley ends abruptly against the city wall's rough brick,
      its worn cobbles slick with storm runoff that pools in the low spots where the
      paving has settled. Rain hammers down between the close walls, turning dust
      to streaks of mud and driving hard enough to blur the alley's far end. The brick
      shows patches of crumbling mortar where weather has worked at the joints, and
      the cobbles gleam dark under the downpour, their uneven surface channeling water
      toward the wall's base. Wind funnels through the narrow space, carrying the
      smell of wet stone and the distant clatter of loose shutters from the working-class
      blocks beyond.
    weather_heavy_rain: The False Alley ends abruptly against the city wall's rough
      brick, its worn cobbles slick with rainwater that streams from the eaves above.
      Runoff pools in the uneven paving where the stones have settled, carrying dust
      and grit toward the single exit south. The shabby brick walls press close on
      either side, their surfaces darkened by the downpour, and the steady rain muffles
      the usual street noise beyond. Here at the wall's edge, the alley offers nothing
      but wet stone and the knowledge that even the rain cannot wash away the marks
      of those who pass through.
    invasion_invasion: "The False Alley ends abruptly against the city wall's rough\
      \ brick, its cobbles worn smooth by boots that know better than to linger. Dust\
      \ hangs in the still air, settling on shabby doorways and cracked mortar where\
      \ the working-class quarter presses close. Shouts echo from the Entry Stair\
      \ beyond the wall\u2014sharp, urgent, carrying the unmistakable edge of alarm.\
      \ Fresh scuff marks streak the cobbles where someone ran hard toward the stair,\
      \ and a wooden crate lies overturned near the wall, its contents scattered in\
      \ haste."
