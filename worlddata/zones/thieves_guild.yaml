- id: lockyard
  name: The Lockyard
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Lockyard sits within the Training Corridor, its planked floor scuffed
    and stained from years of rogues testing their craft at the long workbench that
    runs along the stone wall. Timber beams overhead bear carved tallies and crude
    jokes, each mark a small claim of dignity stolen from the surface world's order.
    Dust hangs in the air, stirred by footsteps from the workshops nearby, and the
    faint sounds of bustling work carry through the chamber's boundaries. The worn
    bench shows generations of lockpicks, bent wires, and practice tumbler sets, evidence
    of a trade passed hand to hand with rough humor and wary pride.
  stateful_descs:
    season_winter: "The Lockyard sits at the end of the Training Corridor, a low-ceilinged\
      \ chamber where stone walls and timber beams frame a planked floor scuffed dark\
      \ by years of boot traffic. A heavy workbench stands against the far wall, its\
      \ surface scarred and stained, holding the tools and broken locks that mark\
      \ this as the guild's practice ground for those learning the craft. Cold air\
      \ seeps through gaps in the planking overhead, carrying dust and the faint sounds\
      \ of movement from the workshops nearby, while frost traces the corners where\
      \ stone meets timber. The space wears its rough use openly\u2014splintered boards,\
      \ tool marks gouged into the bench, and the smell of old wood and metal filings\u2014\
      a place where rogues earn their standing through skill rather than ceremony."
    time_night: The Lockyard sits at the end of the Training Corridor, its planked
      floor scuffed pale where generations of rogues have crossed between workbench
      and door. Stone walls bear the soot of countless lamps, and timber beams overhead
      sag under their own weight, worn smooth where hands have steadied against them
      in lamplight. A heavy workbench stands against the far wall, its surface scarred
      with practice cuts and the ghost-marks of stolen locks pried open in defiant
      study. At this hour the chamber holds only the smell of old dust and the faint
      creak of timber settling, the day's rough laughter gone quiet until morning
      returns the guild's wary pride to these walls.
    time_evening: The Lockyard sits at the end of the Training Corridor, its planked
      floor scuffed pale where generations of rogues have paced between workbench
      and wall. Timber beams overhead carry the weight of stone above, their surfaces
      darkened by years of lampsmoke and dust that hangs thick in the evening air
      as torchlight replaces the day's last glow. The workbench stands against the
      far wall, its scarred surface littered with picks and tension wrenches arranged
      with the careful disorder of working tools, while rough laughter and the clink
      of metal drift in from the workshops nearby. Here in the underworld's own hall,
      thieves practice their craft with the same stolid pride a mason might show his
      chisel, making dignity from what the surface calls crime.
    invasion_invasion: The Lockyard's stone walls and timber beams frame a broad chamber
      where workbenches stand shoved against the far wall, their surfaces scarred
      and cluttered with broken tools and scattered lockpicks. Planked flooring bears
      the scuff of hurried boots and overturned stools, and dust hangs thick in the
      air where rogues have abandoned their practice to grab what weapons they can.
      Shouts echo from the workshops nearby as the guild scrambles to meet the threat,
      turning this training hall into a staging ground where rough humor has given
      way to grim preparation. The worn benches and battered practice locks remain,
      but the usual theatrical swagger of the Training Corridor has sharpened into
      wary defiance.
