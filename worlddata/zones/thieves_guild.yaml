- id: fences_curtain
  name: The Fence's Curtain
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Fence's Curtain sits along Commerce Row, its planked floor scuffed smooth\
    \ by years of careful transactions. Timber walls frame a worn workbench where\
    \ goods change hands without questions, the rough beams overhead darkened by torch\
    \ smoke and time. Dust hangs faint in the still air, settling on surfaces that\
    \ see more whispered deals than honest cleaning. The shabby chamber wears its\
    \ disrepair like a badge\u2014here in Commerce Row's quieter stretch, respectability\
    \ is a liability, and the worn timber speaks to survival through discretion rather\
    \ than display."
  stateful_descs:
    season_winter: The Fence's Curtain sits along Commerce Row, its timber walls and
      planked floor showing the wear of steady trade in goods better left unquestioned.
      A workbench stands against one wall, its surface scarred and stained, while
      overhead beams sag slightly beneath the weight of winter cold seeping through
      the planks. Dust hangs in the still air, and frost edges the corners where timber
      meets floor, a reminder that even here the season presses in. The space carries
      the rough dignity of a place where rogues conduct their business with ceremony
      borrowed from the surface world and turned to their own purposes, shabby but
      deliberate in its claim to order.
    time_night: "The Fence's Curtain sits along Commerce Row, its timber walls and\
      \ planked floor worn smooth by years of careful transactions. A workbench stands\
      \ against the far wall, its scarred surface holding the faint outline of tools\
      \ long since put away for the night. Lamplight from a single shuttered lantern\
      \ throws long shadows across the beams overhead, turning the shabby chamber\
      \ into a stage where rogues conduct their business with theatrical gravity.\
      \ Dust hangs in the still air, and the quiet presses close\u2014this is the\
      \ hour when Commerce Row's defiant commerce moves slowest, when even thieves\
      \ keep their voices low and their movements careful."
    time_evening: "The Fence's Curtain sits at the edge of Commerce Row, its planked\
      \ floor scuffed smooth by years of careful traffic and its timber walls bearing\
      \ the dust of quiet transactions. A workbench stands against the far wall, its\
      \ surface scarred and stained, while overhead beams sag slightly in the evening\
      \ dimness\u2014no pretense here, just the shabby dignity of a shop that knows\
      \ its worth. Lamplight from neighboring establishments seeps through gaps in\
      \ the timber, casting thin lines across the worn planks where merchants and\
      \ rogues conduct their business with theatrical courtesy and wary eyes. The\
      \ air carries the smell of old dust and the particular stillness that settles\
      \ over Commerce Row as legitimate trade gives way to darker commerce."
    invasion_invasion: The Fence's Curtain sits along Commerce Row, its timber walls
      and planked floor showing years of rough use. A scarred workbench stands against
      the far wall, its surface marked with old cuts and stains where goods have been
      inspected and valued. Dust hangs in the still air, and the worn beams overhead
      bear the weight of the chamber with shabby indifference. Now the workbench is
      shoved aside, its usual clutter of tools swept to the floor, and fresh gouges
      scar the planks where something heavy was dragged toward the door in haste.
