- id: threshold
  name: The Threshold
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Threshold opens into the Entry Stair, where flagstones worn smooth by\
    \ countless boots meet timber beams overhead that sag under decades of weight.\
    \ Stone walls bear the scars of rough use\u2014chipped corners, scratched mortar,\
    \ and the faint char of old smoke that still hangs in the quiet air. The space\
    \ carries the lived-in disorder of a place claimed rather than built, where rogues\
    \ have made their own dignity from cast-off stone and salvaged timber, turning\
    \ a forgotten threshold into their defiant entry court."
  stateful_descs:
    season_winter: "The Entry Stair opens into a low threshold beneath timber beams\
      \ blackened by years of smoke, where flagstones show the scuff and wear of countless\
      \ boots crossing between the stair and the passages beyond. Cold air seeps down\
      \ from above, carrying the bite of winter into the stone-walled space and pooling\
      \ near the floor where frost traces the edges of the flags. The quiet here feels\
      \ deliberate, a pocket of stillness held against the world overhead, though\
      \ the faint smell of old smoke and the rough-cut beams speak to those who know\
      \ how to read a rogue's welcome. Stone walls frame the threshold with blunt\
      \ practicality, their surfaces marked by the small dignities of survival\u2014\
      a timber brace wedged firm, a corner worn smooth by shoulders leaning in shared\
      \ conspiracy."
    time_night: "The Entry Stair opens onto a broad threshold of worn flagstone, where\
      \ timber beams frame the passage into the rough stone chamber beyond. Lamplight\
      \ catches the scuff marks and old stains that mark this floor as the court's\
      \ front door, where rogues pass in and out with wary nods rather than ceremony.\
      \ The smoke smell that hangs in the still air speaks to hours of gathered bodies\
      \ and low fires, now mostly quiet in the late watch. Even in the hush, the threshold\
      \ keeps its defiant character\u2014a place where stolen dignity begins at the\
      \ bottom of the stair, and surface law ends at the top."
    time_evening: "The threshold at the base of the Entry Stair opens into worn flagstone\
      \ and timber beams darkened by years of smoke. Stone walls bear the scuffs and\
      \ stains of countless shoulders brushing past, and the floor shows uneven wear\
      \ where boots have crossed between the stair and the passages beyond. The faint\
      \ smell of old smoke lingers in the still air, mixing with the quiet that settles\
      \ as evening dims what little light reaches this corner of the Entry Wing. Here\
      \ at the boundary, the space holds a stubborn dignity in its rough use\u2014\
      every mark on the stone a record of those who passed through and claimed this\
      \ threshold as their own."
    invasion_invasion: "The Threshold opens into Entry Wing with flagstone underfoot\
      \ and timber beams overhead, their surfaces darkened by years of smoke and rough\
      \ use. Stone walls frame the space where rogues gather to mock surface ceremony\
      \ with their own stolen dignity, scuff marks and ale stains marking where defiant\
      \ laughter has echoed against the oppressive weight above. Now shouts carry\
      \ from deeper in Entry Wing, and fresh boot-prints track mud and blood across\
      \ the worn flags where someone ran through moments before. The smoke-smell thickens\
      \ with something sharper\u2014scorched wood or spilled lamp oil\u2014and the\
      \ quiet that normally settles here has broken into hurried movement and low,\
      \ urgent voices."
