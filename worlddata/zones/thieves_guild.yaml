- id: memorial_wall
  name: The Memorial Wall
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Memorial Wall stands at the end of Common Passage, a rough-hewn chamber\
    \ where stone walls bear carved names and crude symbols marking those the underclass\
    \ claims as their own. Timber beams overhead show smoke stains from years of candle\
    \ offerings left at the low shrine set into the eastern wall, its surface worn\
    \ smooth by countless hands. The flagstone floor is uneven, patched with mismatched\
    \ stone where the living have made repairs in defiance of the dungeon's decay.\
    \ Smoke hangs faint in the still air, carrying the scent of tallow and old incense,\
    \ while the quiet presses close around the chamber's boundaries\u2014a stolen\
    \ dignity carved from stone and memory."
  stateful_descs:
    season_winter: The Memorial Wall stands at the end of Common Passage, a low chamber
      beneath timber beams blackened by years of smoke. Flagstones show uneven wear
      where feet have gathered before the shrine set into the far wall, its surface
      carved with names and rough tokens left by those who claim no other monument.
      Cold air seeps through gaps in the stonework, carrying the smell of old smoke
      and winter damp. The space holds a defiant stillness, as though each scratched
      name answers the surface world's refusal to remember.
    time_night: "The Memorial Wall stands at the end of Common Passage, a rough-hewn\
      \ chamber where flagstones meet stone walls marked by soot and old scratches.\
      \ Timber beams overhead carry the weight of the dungeon above, their surfaces\
      \ darkened by years of lampsmoke that still hangs faint in the night air. A\
      \ makeshift shrine occupies the far wall, its surface cluttered with stolen\
      \ candles, bent coins, and carved names\u2014rogues claiming their own saints\
      \ where the surface world would grant them none. The quiet here feels deliberate,\
      \ a pocket of hush where even defiance pauses to remember its dead."
    time_evening: The Memorial Wall stands at the end of Common Passage, a rough-hewn
      chamber where flagstones meet stone walls scarred with carved names and crude
      epitaphs. Timber beams overhead bear smoke stains from years of candles and
      offerings left at the makeshift shrine, where thieves honor their own dead with
      the same ceremony the surface world denies them. Evening light fades through
      gaps in the stonework, leaving the carved names to retreat into shadow as someone
      lights fresh candles along the shrine's base. The smoke smell thickens in the
      still air, and the quiet here feels deliberate, a pocket of respect carved from
      the warren's usual noise.
    invasion_invasion: "The Memorial Wall stands at the end of Common Passage, its\
      \ flagstone floor worn smooth by years of footfalls and its timber beams darkened\
      \ by smoke. Stone walls bear carved names and rough symbols\u2014marks of those\
      \ the underclass claims as their own, each scratch a small defiance against\
      \ being forgotten. The shrine sits against the far wall, its surface cluttered\
      \ with stolen candles and tarnished coins left in mockery of surface devotion.\
      \ Now the quiet is broken by shouts echoing down Common Passage and the acrid\
      \ smell of burning wood drifting through the chamber, while scattered offerings\
      \ lie kicked aside where someone fled in haste."
