- id: the_pit
  name: The Pit
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Pit sits at the end of Training Corridor, a low-ceilinged chamber where
    stone walls and timber beams frame a dirt floor scuffed bare by countless boots.
    A battered workbench stands against the far wall, its surface scarred with knife
    marks and old stains, while the air carries the smell of dust and sweat from the
    busy corridor beyond. Rough bunks line the walls in careless rows, their frames
    patched with scavenged timber and rope, each claiming a small territory in the
    communal press. The space wears its shabbiness like a badge, every worn surface
    and makeshift repair a record of rogues who learned their trade here and moved
    on.
  stateful_descs:
    season_winter: The Pit sprawls beneath timber beams in the Training Corridor,
      its dirt floor packed hard by winter cold and countless boots. A battered workbench
      stands against the stone wall, scarred with blade marks and stained rings where
      mugs have sat through long watches. Dust hangs in the frigid air, carrying the
      smell of old sweat and lamp oil, while the rough stone walls hold close the
      warmth of bodies and defiant laughter that marks this as the rogues' own ground.
      Worn bedrolls and scattered gear claim the corners with the casual ownership
      of those who've made dignity from shared survival in the Training Wing's cold
      depths.
    time_night: The Pit sits at the end of Training Corridor, a low-ceilinged chamber
      where stone walls and timber beams frame a dirt floor scuffed bare by countless
      drills. A battered workbench stands against the far wall, its surface scarred
      and stained from years of rough use. Lamplight throws long shadows across the
      worn space, picking out the dust that hangs in the still air and the dark corners
      where the beams meet stone. The chamber is quiet now, holding only the faint
      creak of timber and the smell of old sweat and earth, but the scuffed ground
      and battered bench speak to the hard training that fills this place when daylight
      returns.
    time_evening: "The Pit sprawls beneath low timber beams in the Training Corridor,\
      \ its stone walls scarred from years of rough use and its dirt floor packed\
      \ hard by countless boots. A battered workbench stands against the far wall,\
      \ its surface scored and stained, holding the tools of a trade learned in defiance\
      \ rather than guild halls. Evening lamplight catches the dust hanging in the\
      \ air, turning the shabby barracks into a stage where rogues claim their own\
      \ rough dignity after the day's work. The space carries the weight of shared\
      \ survival\u2014every worn corner and splintered beam a monument to those who\
      \ built honor from what the surface world discarded."
    invasion_invasion: "The Pit sprawls beneath timber beams at the end of Training\
      \ Corridor, its stone walls scarred from years of rough practice and rougher\
      \ living. A battered workbench stands against the far wall, its surface scored\
      \ with blade marks and old ale stains that speak to off-duty hours spent sharpening\
      \ steel and sharpening wit. Now the usual clatter of sparring and laughter is\
      \ gone\u2014overturned stools and scattered training gear mark where rogues\
      \ abandoned drills when the alarm came, and bootprints in the dirt floor lead\
      \ toward the corridor in hurried formation. Dust hangs thick in the air, stirred\
      \ by the sudden exodus, while distant shouts carry the edge of real danger rather\
      \ than the theatrical bravado that normally fills this shabby hall."
