- id: vault
  name: The Vault
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Vault sits beneath the Leadership Stair, its flagstone floor worn smooth\
    \ by years of careful traffic and its stone walls bearing the scuff marks of crates\
    \ dragged into corners. Timber beams overhead sag slightly under their own weight,\
    \ darkened by smoke and time, while dust gathers thickest where the light from\
    \ the stairway fails to reach. The air carries the dry smell of old wood and stored\
    \ goods, quiet except for the occasional creak of settling timber\u2014a stillness\
    \ that feels deliberate, as though the chamber itself keeps watch. Here in this\
    \ worn warehouse space, what the surface world discards or overlooks finds safekeeping\
    \ among those who claim dignity through what they preserve rather than what they\
    \ own."
  stateful_descs:
    season_winter: The Vault sits beneath Leadership Stair, a low-ceilinged chamber
      where timber beams press close above worn flagstones and stone walls bear the
      scars of repurposed storage. Cold air seeps through gaps in the masonry, carrying
      the smell of dust and winter damp, while frost traces the edges of the floor
      where warmth never reaches. Rough benches and scattered crates mark this as
      a gathering place for those who claim dignity from shared survival, their presence
      written in scuff marks and the faint reek of old ale. The space holds a defiant
      warmth despite the season's bite, as if the rogues who meet here refuse the
      surface world's cold along with its law.
    time_night: The Vault sits beneath Leadership Stair, its flagstone floor scuffed
      by years of traffic and its stone walls marked with old tally scratches where
      goods once passed through rough hands. Timber beams overhead carry the weight
      of the chambers above, their surfaces darkened by lampsmoke and time. In the
      night's hush, a single lamp throws long shadows across the worn flags, and the
      dust-smell hangs heavier in the still air. This space has served the underclass
      court as warehouse and gathering point both, its lived-in disorder a quiet mockery
      of the orderly vaults above ground.
    time_evening: "The Vault sits beneath the Leadership Stair, a low-ceilinged chamber\
      \ where timber beams press close above flagstone worn smooth by years of traffic.\
      \ Stone walls bear the scuff marks and scratches of crates dragged in and out,\
      \ and the dust-smell hangs thick in the evening air as lamplight begins to replace\
      \ the last gray daylight filtering through cracks high in the masonry. Rough\
      \ wooden shelving lines the walls, stacked with goods that carry no merchant's\
      \ mark, and the quiet here feels deliberate\u2014a space where the surface world's\
      \ ledgers hold no authority and what passes through leaves no official record."
    invasion_invasion: "The Vault sits beneath Leadership Stair, a low-ceilinged chamber\
      \ where timber beams press down over flagstone worn smooth by years of traffic.\
      \ Stone walls bear scuff marks and old stains, and the air carries the smell\
      \ of dust and old wood. Crates and barrels stand stacked against the walls in\
      \ rough order, their contents unmarked but clearly accounted for by those who\
      \ know. Shouts echo down from the stair above, and fresh bootprints track dirt\
      \ across the floor where someone has just run through\u2014the usual stillness\
      \ of this storage space broken by the alarm spreading through Leadership Wing."
