- id: common_hearth
  name: The Common Hearth
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Common Hearth sits along Common Passage, its planked floor worn smooth
    by constant traffic through the rough stone chamber. Timber beams cross overhead,
    darkened by years of smoke from the central hearth where embers glow beneath ash.
    Stone walls bear the marks of makeshift repairs and carved tallies, evidence of
    shared survival among those who claim this space as their own. The smoke-smell
    mingles with the sound of voices from nearby taverns, and scuff marks around the
    hearth show where residents gather to trade stories and mock the world above with
    hard-earned laughter.
  stateful_descs:
    season_winter: The Common Hearth sits within Common Wing, a low-ceilinged chamber
      where stone walls press close around a planked floor worn smooth by years of
      rough traffic. Timber beams overhead bear soot stains from the central hearth,
      which throws smoke-scented warmth against the winter cold seeping through gaps
      in the stonework. Threadbare blankets hang across doorways to hold the heat,
      and the floor near the fire shows scuff marks where residents gather close on
      frozen nights. The space carries the worn dignity of shared survival, its impoverished
      fixtures arranged with deliberate care against the season's bite.
    time_night: The Common Hearth sits at the end of Common Passage, its planked floor
      worn smooth by years of gathered feet and its stone walls blackened above the
      cold hearth. Timber beams overhead carry old soot, and the smell of smoke lingers
      even now in the night's stillness. A few rough benches stand against the walls
      where rogues gather by day to share stolen bread and mock the surface world's
      ceremonies, but lamplight now falls only on empty corners and the scuffed planks
      where boots have shuffled through a hundred defiant toasts. The space holds
      its communal warmth in absence, waiting for morning's return.
    time_evening: "The Common Hearth sits along Common Passage, its planked floor\
      \ worn smooth by countless boots and its stone walls blackened from years of\
      \ smoke. Timber beams cross overhead, rough-hewn and patched where they've split,\
      \ while the central hearth holds banked coals that glow brighter as evening\
      \ dims the room's corners. Scuff marks and stains map where benches have been\
      \ dragged aside for dice games or sudden arguments, and the smell of old smoke\
      \ mixes with the faint noise of taverns settling into their nightly trade beyond\
      \ the walls. Here in Common Wing's ground floor, the worn space carries the\
      \ weight of shared survival\u2014every stain and crack a record of those who've\
      \ claimed dignity from what the surface world discards."
    invasion_invasion: "The Common Hearth sits along Common Passage, its planked floor\
      \ scarred by years of rough use and its stone walls blackened above a cold hearth\
      \ now abandoned in haste. Timber beams overhead still carry the faint smell\
      \ of old smoke, but the usual defiant laughter and spilled-ale warmth have fled\u2014\
      overturned stools and a shattered cup mark where residents scattered when the\
      \ alarm came. Scuff marks lead toward the passage outside, evidence of the community's\
      \ quick retreat from whatever threat drove them from their claimed refuge. The\
      \ worn space, normally thick with the rough pride of those who make dignity\
      \ from survival, now holds only the tense silence of interrupted lives."
