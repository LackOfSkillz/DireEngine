- id: honest_stall
  name: The Honest Stall
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Honest Stall sits along Commerce Row, its timber walls and planked floor
    worn smooth by steady traffic through the busy district. Overhead beams show the
    marks of rough carpentry, fitted without ceremony but holding firm. A signpost
    leans beside the entrance, its painted lettering faded but still legible in the
    dim light that filters through from the corridor beyond. The air carries smoke
    and the low hum of voices from nearby shops, where merchants trade in goods the
    surface world prefers not to name.
  stateful_descs:
    season_winter: "The Honest Stall opens onto Commerce Row through a timber-framed\
      \ doorway, its planked floor scuffed dark where customers cross between the\
      \ counter and the street. Rough-hewn beams overhead carry carved marks\u2014\
      tallies, curses, and crude heraldry mocking the surface world's crests\u2014\
      while smoke from nearby cookfires drifts through gaps in the timber walls. Cold\
      \ air seeps in around the doorframe, carrying the bite of winter from the Row\
      \ outside, and frost traces the edges of the planks near the threshold. A weathered\
      \ signpost leans against the wall beside the counter, its painted lettering\
      \ worn but still defiant, claiming honest trade in a place built on stolen dignity."
    time_night: The Honest Stall sits along Commerce Row, its timber walls and planked
      floor worn smooth by years of rough trade. A hand-painted signpost hangs crooked
      above the counter, its gilt letters half-flaked but still proclaiming honest
      dealing with theatrical irony. At night, lamplight pools across the planks where
      merchants once haggled, leaving the timber beams overhead in shadow and the
      corners dark. The air carries old smoke and the faint sourness of spilled drink,
      evidence of the stall's long service to those who make dignity from what the
      surface world discards.
    time_evening: The Honest Stall sits along Commerce Row, its planked floor scuffed
      dark where customers have haggled and turned away. Timber walls bear a painted
      signpost declaring fair prices in script that mocks the surface world's merchant
      guilds, while overhead beams show soot from years of lamplight. Evening trade
      has slowed, leaving only the smell of smoke and the faint echo of voices from
      neighboring shops where other rogues settle their day's accounts. The worn timbers
      and rough-cut planks speak to survival rather than prosperity, each scuff mark
      a small defiance against the weight pressing down from above.
    invasion_invasion: The Honest Stall's timber walls and planked floor show years
      of hard use along Commerce Row, its beams darkened by smoke and the press of
      rough trade. A weathered signpost leans beside the entrance, its painted letters
      faded but still readable above scuff marks where boots have knocked against
      it. Overturned crates and scattered goods mark where merchants fled when the
      alarm sounded, leaving the shop's usual clutter now trampled and abandoned.
      The smell of smoke carries sharper than usual, and shouts echo from the nearby
      shops where the incursion pushes through Commerce Wing's crowded passages.
