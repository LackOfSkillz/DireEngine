- id: court_of_coins
  name: The Court of Coins
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Court of Coins sprawls beneath timber beams blackened by years of firepit
    smoke, its flagstone floor worn smooth by countless boots and marked with old
    stains no one bothers to scrub. Stone walls bear crude tallies and mockeries of
    surface law, carved by hands that found dignity in defiance rather than coin.
    The central firepit throws uneven light across benches and low tables where rogues
    gather to settle disputes with rough ceremony, their laughter sharp-edged and
    their silences watchful. Smoke hangs thick in the air, carrying the smell of cheap
    ale and old timber, while the worn threshold shows how many have passed through
    seeking justice that the world above would never grant them.
  stateful_descs:
    season_winter: The Court of Coins sprawls beneath timber beams blackened by years
      of smoke, its flagstone floor worn smooth where rogues gather around a central
      firepit that throws heat against the winter cold seeping through stone walls.
      Rough benches ring the flames in a mockery of formal council, their arrangement
      claiming dignity from shared warmth rather than ceremony. Smoke curls thick
      toward the beams, carrying the smell of burning wood and spilled ale, while
      voices rise and fall in wary laughter that marks this chamber as a place where
      the city's hidden keep their own rough court. The firepit's light catches on
      frost-edged cracks in the flagstones near the walls, where winter's bite reaches
      even this deep refuge within the Common Wing.
    time_night: The Court of Coins sits low-ceilinged beneath timber beams blackened
      by years of smoke from the central firepit, its worn flagstones bearing the
      scuff and stain of countless boots. Stone walls press close around the chamber,
      their rough surfaces catching lamplight in uneven pools that leave the corners
      in shadow. The air carries smoke and the faint sourness of spilled drink, quieter
      now in the late hours but still marked by low voices and the occasional scrape
      of a bench. Here in the Common Wing's hidden hall, the thieves' mock court holds
      its own rough dignity, where stolen ceremony and wary humor make a kind of home
      from what the surface world discards.
    time_evening: The Court of Coins sits beneath timber beams darkened by years of
      smoke, its flagstone floor worn smooth where rogues gather around a central
      firepit that casts long shadows across the stone walls as evening settles in.
      Rough benches and overturned crates form a makeshift council ring, their arrangement
      a deliberate mockery of the guildhalls above, where thieves hold court with
      the same ceremony their betters claim by birthright. The smoke carries the day's
      spilled ale and sweat, thickening as lamplight replaces the last pale glow from
      narrow vents near the ceiling. Voices rise in wary banter and sharp laughter,
      each word tested before it's trusted, the room's warmth earned through shared
      survival rather than given freely.
    invasion_invasion: The Court of Coins sits beneath timber beams blackened by years
      of smoke from the central firepit, its flagstone floor scuffed by countless
      boots and scattered with overturned benches. Stone walls bear crude tallies
      and mockeries of surface law, their rough surfaces now marred by fresh gouges
      where blades struck in haste. The smoke-thick air carries shouts and the scrape
      of steel as rogues bar the chamber's exits against the incursion, their usual
      rough laughter replaced by hard-edged commands. What was once a place of defiant
      ceremony now holds only the tense preparation of thieves defending their hidden
      court.
