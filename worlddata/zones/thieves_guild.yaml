- id: watcher_nook
  name: The Watcher's Nook
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: "The Watcher's Nook sits at the base of the Entry Stair, a low-ceilinged chamber\
    \ where timber beams press close above worn planks. Stone walls bear the scuffs\
    \ and stains of long occupation, and the faint smell of old smoke clings to the\
    \ corners where guards have warmed themselves between shifts. Rough bunks line\
    \ the walls in careless rows, their frames showing the marks of countless boots\
    \ and elbows, while the floor between them is darkened by traffic and spilled\
    \ drink. This is working space, not ceremony\u2014a place where the Guild's sentries\
    \ rest with the same rough humor they bring to their watch, making dignity from\
    \ shared exhaustion and stolen comfort."
  stateful_descs:
    season_winter: "A low-ceilinged chamber in the Entry Stair serves as a barracks,\
      \ its planked floor scuffed and stained from years of boots and spilled drink.\
      \ Timber beams cross overhead, darkened by old smoke, while stone walls show\
      \ the rough marks of careless use and makeshift repairs. Cold air seeps through\
      \ gaps in the planking, carrying the faint smell of smoke and winter damp, and\
      \ frost traces the corners where stone meets timber. The worn bunks and scattered\
      \ gear speak to a working-class defiance\u2014rogues claiming rest in a space\
      \ that refuses any pretense of comfort, making dignity from shared survival\
      \ in the chill."
    time_night: The Watcher's Nook sits at the base of the Entry Stair, its planked
      floor scuffed and stained from years of boots tracking in from the Entry Wing
      above. Stone walls bear the soot of countless lamps, and timber beams overhead
      sag slightly under their own weight. In the lamplight, rough bunks line the
      chamber's edges, their frames patched with mismatched timber and their blankets
      worn thin. The smoke-smell of old fires clings to the still air, and the quiet
      carries a watchful quality, as though the space itself keeps guard while its
      occupants rest.
    time_evening: The Watcher's Nook sits at the base of the Entry Stair, its planked
      floor worn smooth by boots crossing between the barracks and the passages beyond.
      Stone walls rise to timber beams overhead, their surfaces darkened by years
      of smoke from braziers and lamps now being lit against the evening dim. Rough
      bunks line the western wall, their frames patched with mismatched timber, while
      scuffed gear rests in corners where off-duty watchers have dropped it. The air
      carries the smell of old smoke and the quiet sounds of voices settling into
      the night's first watch, wary and low.
    invasion_invasion: The Watcher's Nook sits at the edge of the Entry Stair, a low-ceilinged
      chamber with stone walls and a planked floor scuffed dark by boots and dragged
      furniture. Timber beams overhead bear old smoke stains, and the air carries
      the smell of burnt tallow and old sweat. A rough bench lies overturned near
      the wall, and scattered gear marks where someone left in haste. Shouts echo
      down from the stair above, and the usual rough laughter that fills this corner
      of the Entry Wing is gone, replaced by the sound of running feet and barked
      warnings.
