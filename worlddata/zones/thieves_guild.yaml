- id: quartermaster_hold
  name: The Quartermaster's Hold
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: ''
  desc: The Quartermaster's Hold sits along Commerce Row, its timber walls and planked
    floor worn smooth by years of traffic through the warehouse chamber. A sturdy
    workbench stands against the eastern wall, its surface scarred and stained from
    constant use, while overhead beams show the marks of rope and pulley work. Dust
    hangs faint in the still air, settling on crates and corners where goods have
    been stacked and moved countless times. The quiet here feels deliberate, a pocket
    of working space carved from Commerce Row's usual noise, where rogues handle their
    trade with the same rough efficiency they bring to everything else.
  stateful_descs:
    season_winter: The Quartermaster's Hold sits at the end of Commerce Row, its timber
      walls and planked floor bearing the scuff and stain of steady use. A workbench
      stands against the far wall, its surface marked by years of inventory tallies
      and rough dealings, while overhead beams show the soot of countless torches
      lit in defiance of the surface world's daylight hours. Cold air seeps through
      gaps in the planking, carrying the smell of dust and winter damp, and frost
      edges the corners where the timber meets stone. The space holds the worn dignity
      of a place where rogues conduct their commerce with the same ceremony others
      reserve for guildhalls, making theater from survival and order from what the
      world above discards.
    time_night: "The Quartermaster's Hold sits along Commerce Row, its timber walls\
      \ and planked floor bearing the scuff and stain of steady trade. A workbench\
      \ stands against the far wall, its surface scarred by years of tallying and\
      \ sorting beneath the timber beams overhead. Lamplight pools unevenly across\
      \ the planks, leaving the corners in shadow and the dust-smell hanging thick\
      \ where the night air does not reach. The quiet presses close here after dark,\
      \ broken only by the occasional creak of settling wood\u2014a working-class\
      \ stillness that feels less like rest and more like a held breath."
    time_evening: The Quartermaster's Hold sits at the back of Commerce Row, its timber
      walls and planked floor bearing the scuff and stain of steady use. A workbench
      stands against the far wall, its surface marked with old cuts and the dust of
      counted goods, while overhead beams show the soot of torches lit each evening
      when daylight fades from the warehouse district. The air carries the dry smell
      of stored cloth and grain, quieter now as the day's traffic settles and lamplight
      begins to pool in the corners. This is working space claimed and kept, where
      rogues count what they've taken and make their own order from it.
    invasion_invasion: The Quartermaster's Hold sits along Commerce Row, its timber
      walls and planked floor scarred by years of rough use. A workbench stands shoved
      against the far wall, its surface scattered with broken tools and torn ledgers
      left in haste. Overhead, the timber beams carry fresh scorch marks where something
      burned recently, and the dust-smell is cut by smoke still hanging in the quiet.
      The worn planks show drag marks leading toward the exit, evidence of goods hauled
      out fast when the alarm came.
