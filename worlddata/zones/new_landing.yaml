- id: amberwick-lane-midway-4214-4214
  name: Amberwick Lane, Midway
  typeclass: typeclasses.rooms_extended.ExtendedDireRoom
  short_desc: null
  desc: Amberwick Lane runs laterally through the block here, narrower and more personal
    than the great streets but no less busy for it. This is the kind of middle block
    where a city's real character tends to show itself. Ashlar-fronted town houses
    and disciplined guild walls keep the road feeling orderly despite the traffic.
    Conversation carries in lower tones here, interrupted by carriage wheels, distant
    bells, and the clipped pace of people who know where they are going. Nearby, Clerie's
    6 gives this stretch of the city a more distinct identity. The surrounding facades
    feel more deliberate here, with cleaner stonework and a quieter civic order.
